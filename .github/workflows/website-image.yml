name: Build & Push Website Image

# Builds the Next.js website Docker image and pushes it to GitHub Container
# Registry (ghcr.io/bzkx/promptlens-website). Triggered on every push to main
# that touches website code, or manually via the Actions UI ("Run workflow").
#
# Why this exists: lets the maintainer publish images without needing Docker
# installed locally (e.g. corporate-locked laptop). VPS just `docker compose pull`.

on:
  push:
    branches: [main]
    paths:
      - 'apps/website/**'
      - 'packages/core/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/website-image.yml'
  workflow_dispatch: # manual trigger

concurrency:
  group: website-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bzkx/promptlens-website

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required for pushing to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract website version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/website/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/website/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SITE_URL=https://promptlens.cc

      - name: Image digest
        run: |
          echo "Pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
          echo "Pull on VPS: docker compose pull && docker compose up -d"
